<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; color: #111; max-width: 700px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .upload { border: 1px solid #ccc; border-radius: 6px; padding: 12px; margin-bottom: 12px; }
    .upload p { font-size: 12px; color: #888; margin-bottom: 8px; }
    input[type="file"] { font-size: 13px; }
    button { padding: 7px 14px; font-size: 13px; border: 1px solid #ccc; border-radius: 5px; background: #fff; cursor: pointer; }
    button:hover { background: #f5f5f5; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #processBtn { background: #111; color: #fff; border-color: #111; margin-top: 8px; }
    #processBtn:hover:not(:disabled) { background: #333; }
    #status { font-size: 12px; margin-top: 8px; color: #555; }
    #messages { border: 1px solid #e0e0e0; border-radius: 6px; min-height: 300px; max-height: 400px; overflow-y: auto; padding: 12px; margin: 16px 0; display: flex; flex-direction: column; gap: 10px; }
    .empty { color: #bbb; font-size: 13px; text-align: center; margin: auto; }
    .msg { max-width: 80%; }
    .msg.user { align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .bubble { padding: 8px 12px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; }
    .msg.user .bubble { background: #111; color: #fff; }
    .msg.bot  .bubble { background: #f0f0f0; }
    .ts { font-size: 10px; color: #bbb; margin-top: 2px; padding: 0 4px; }
    .msg.user .ts { text-align: right; }
    .input-row { display: flex; gap: 8px; }
    .input-row textarea { flex: 1; border: 1px solid #ccc; border-radius: 6px; padding: 8px 10px; font-size: 13.5px; font-family: inherit; resize: none; min-height: 38px; max-height: 100px; outline: none; }
    .input-row textarea:focus { border-color: #888; }
    .input-row button { align-self: flex-end; }
    .dot { display: inline-block; width: 5px; height: 5px; background: #aaa; border-radius: 50%; margin: 0 2px; animation: b 1s infinite; }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes b { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
  </style>
</head>
<body>

<h1>PDF Chatbot</h1>

<div class="upload">
  <p>Upload one or more PDF files then click Process.</p>
  <input type="file" id="fileInput" accept=".pdf" multiple/>
  <br/>
  <button id="processBtn" disabled>Process</button>
  <div id="status"></div>
</div>

<div id="messages">
  <div class="empty" id="empty">Upload a PDF to get started</div>
</div>

<div class="input-row">
  <textarea id="input" placeholder="Ask a question..." rows="1" disabled></textarea>
  <button id="sendBtn" disabled>Send</button>
</div>

<script>
  const BACKEND = "http://127.0.0.1:5000";
  let ready = false;

  const fileInput  = document.getElementById("fileInput");
  const processBtn = document.getElementById("processBtn");
  const statusEl   = document.getElementById("status");
  const messages   = document.getElementById("messages");
  const empty      = document.getElementById("empty");
  const input      = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");

  fileInput.addEventListener("change", () => {
    processBtn.disabled = fileInput.files.length === 0;
  });

  processBtn.addEventListener("click", async () => {
    statusEl.textContent = "Processing...";
    processBtn.disabled = true;
    const fd = new FormData();
    for (const f of fileInput.files) fd.append("pdfs", f);
    try {
      const res  = await fetch(`${BACKEND}/upload`, { method: "POST", body: fd });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      ready = true;
      statusEl.textContent = data.message;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    } catch (e) {
      statusEl.textContent = "Error: " + e.message;
      processBtn.disabled = false;
    }
  });

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener("click", send);

  async function send() {
    const text = input.value.trim();
    if (!text || !ready) return;
    input.value = "";
    input.disabled = true;
    sendBtn.disabled = true;
    addMsg("user", text);
    const typing = addTyping();
    try {
      const res  = await fetch(`${BACKEND}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: text })
      });
      const data = await res.json();
      typing.remove();
      if (!res.ok) throw new Error(data.error);
      addMsg("bot", data.answer);
    } catch (e) {
      typing.remove();
      addMsg("bot", "Error: " + e.message);
    } finally {
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function addMsg(role, text) {
    if (empty.parentNode) empty.remove();
    const time = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const d = document.createElement("div");
    d.className = `msg ${role}`;
    d.innerHTML = `<div class="bubble">${text.replace(/\n/g,"<br/>")}</div><div class="ts">${time}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function addTyping() {
    if (empty.parentNode) empty.remove();
    const d = document.createElement("div");
    d.className = "msg bot";
    d.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
    return d;
  }
</script>
</body>
</html>
